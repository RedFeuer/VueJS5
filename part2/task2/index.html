<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Lab5 Part2 Task2</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
      }

      #app {
        padding: 32px;
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #2f80ed;
        color: white;
        cursor: pointer;
      }

      .counter {
        margin-top: 16px;
        font-size: 24px;
        font-weight: 700;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <h1>Кликер через Vue script</h1>

      <button @click="increment">
        Кликнуть
      </button>

      <p class="counter">
        Очки: {{ points }}
      </p>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
      const { createApp, ref } = Vue

      createApp({
        setup() {
          const points = ref(0)

          function increment() {
            points.value += 1
          }

          return {
            points,
            increment
          }
        }
      }).mount('#app')
    </script>
  </body>
</html>
